server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET}}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}
twilio.verify.service.sid=${TWILIO_VERIFY_SERVICE_SID}

groq.api.key=${GROQ_API_KEY:}
twilio.verify.sid=${TWILIO_VERIFY_SID}
otp.resend-cooldown-seconds=${OTP_RESEND_COOLDOWN_SECONDS:60}
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://13.207.106.215:8081}
